name: Build Liz Linux

on:
  workflow_dispatch:
  push:
    tags:
      - "liz-v*"

jobs:
  build-linux:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect app dir
        id: appdir
        run: |
          if [ -f "desktop-tauri/package.json" ]; then
            echo "dir=desktop-tauri" >> "$GITHUB_OUTPUT"
          elif [ -f "package.json" ]; then
            echo "dir=." >> "$GITHUB_OUTPUT"
          else
            echo "Nenhum package.json encontrado no repo." >&2
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            rpm \
            patchelf

      - name: Install dependencies
        working-directory: ${{ steps.appdir.outputs.dir }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build Linux bundles
        working-directory: ${{ steps.appdir.outputs.dir }}
        run: |
          if npm run | grep -q "build:linux"; then
            npm run build:linux
          else
            npx tauri build --bundles appimage,deb,rpm
          fi

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: liz-linux-bundles
          if-no-files-found: error
          path: |
            ${{ steps.appdir.outputs.dir }}/src-tauri/target/release/bundle/appimage/**
            ${{ steps.appdir.outputs.dir }}/src-tauri/target/release/bundle/deb/**
            ${{ steps.appdir.outputs.dir }}/src-tauri/target/release/bundle/rpm/**
