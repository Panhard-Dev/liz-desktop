name: Build Liz Linux

on:
  workflow_dispatch:
  push:
    tags:
      - "liz-v*"

jobs:
  build-linux:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop-tauri/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            rpm \
            patchelf

      - name: Install desktop-tauri dependencies
        working-directory: desktop-tauri
        run: npm ci

      - name: Build Linux bundles (AppImage + deb + rpm)
        working-directory: desktop-tauri
        run: npm run build:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: liz-linux-bundles
          if-no-files-found: error
          path: |
            desktop-tauri/src-tauri/target/release/bundle/appimage/**
            desktop-tauri/src-tauri/target/release/bundle/deb/**
            desktop-tauri/src-tauri/target/release/bundle/rpm/**
