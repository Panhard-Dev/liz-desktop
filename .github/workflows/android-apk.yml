name: Build Liz Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - "liz-android-v*"

jobs:
  build-android:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile-android/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install mobile dependencies
        working-directory: mobile-android
        run: npm install

      - name: Ensure Android project exists
        run: |
          if [ ! -d "mobile-android/android" ]; then
            cd mobile-android
            npx cap add android
          fi

      - name: Prepare web and sync
        working-directory: mobile-android
        run: |
          npm run prepare:web
          npx cap sync android

      - name: Build debug APK
        working-directory: mobile-android/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Prepare APK artifact
        run: |
          mkdir -p mobile-android/dist
          cp mobile-android/android/app/build/outputs/apk/debug/app-debug.apk mobile-android/dist/Liz-android-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: liz-android-apk
          if-no-files-found: error
          path: mobile-android/dist/Liz-android-debug.apk
