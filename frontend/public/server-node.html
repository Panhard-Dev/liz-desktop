<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liz Server Node</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d111a;
      color: #6c758f;
      font-family: 'DM Sans', sans-serif;
      text-align: center;
    }

    .panel {
      border: 1px solid #1f2a3f;
      border-radius: 10px;
      padding: 14px 18px;
      width: min(380px, calc(100vw - 32px));
      background: #121827;
    }

    .title {
      margin: 0 0 8px;
      color: #65b4ff;
      font-size: 13px;
      letter-spacing: 0.05em;
    }

    .status {
      font-size: 12px;
      color: #2dd4bf;
      border: 1px solid #273452;
      border-radius: 8px;
      padding: 8px 10px;
      background: #0f1627;
    }

    .status.error {
      color: #fca5a5;
      border-color: #4f2a36;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h1 class="title">LIZ SERVER NODE</h1>
    <div id="serverStatus" class="status">Iniciando...</div>
  </div>

  <script>
    (function initLizServerNode() {
      const CHANNEL = 'liz-bridge-v1';
      const REQUEST_TYPE = 'LIZ_BRIDGE_REQUEST';
      const RESPONSE_TYPE = 'LIZ_BRIDGE_RESPONSE';
      const statusNode = document.getElementById('serverStatus');
      const MODEL_CONFIG = {
        mini: { apiModel: 'liz-mini', proxyPath: '/api/liz-mini' },
        '2.3': { apiModel: 'liz-2.3', proxyPath: '/api/liz-2.3' },
        flash: { apiModel: 'liz-flash', proxyPath: '/api/liz-flash' },
        '2.5': { apiModel: 'liz-2.5', proxyPath: '/api/liz-2.5' },
      };

      function setStatus(text, isError) {
        if (!statusNode) return;
        statusNode.textContent = String(text || '');
        statusNode.classList.toggle('error', Boolean(isError));
      }

      function normalizeModel(value) {
        const normalized = String(value || '').trim().toLowerCase();
        if (normalized === 'mini' || normalized === 'liz-mini') return 'mini';
        if (normalized === '2.3' || normalized === 'liz-2.3') return '2.3';
        if (
          normalized === 'flash'
          || normalized === 'liz flash'
          || normalized === 'liz-flash'
        ) {
          return 'flash';
        }
        if (
          normalized === '2.5'
          || normalized === 'liz 2.5'
          || normalized === 'liz-2.5'
        ) {
          return '2.5';
        }
        return 'mini';
      }

      function normalizeMessages(payload) {
        const source = payload && typeof payload === 'object' ? payload : {};
        const directMessages = Array.isArray(source.messages) ? source.messages : [];
        const normalizedDirect = directMessages
          .map(entry => {
            const role = String(entry?.role || '').trim().toLowerCase();
            const safeRole = ['user', 'assistant', 'system'].includes(role) ? role : 'user';
            const content = String(entry?.content || '').trim();
            return content ? { role: safeRole, content } : null;
          })
          .filter(Boolean);
        if (normalizedDirect.length > 0) return normalizedDirect;

        const legacyContents = Array.isArray(source.contents) ? source.contents : [];
        const normalizedLegacy = legacyContents
          .map(entry => {
            const role = String(entry?.role || '').trim().toLowerCase();
            const safeRole = ['user', 'assistant', 'system'].includes(role) ? role : 'user';
            const parts = Array.isArray(entry?.parts) ? entry.parts : [];
            const content = parts
              .map(part => String(part?.text || '').trim())
              .filter(Boolean)
              .join('\n')
              .trim();
            return content ? { role: safeRole, content } : null;
          })
          .filter(Boolean);
        if (normalizedLegacy.length > 0) return normalizedLegacy;

        const text = String(source.message || '').trim();
        if (text) return [{ role: 'user', content: text }];
        return [];
      }

      function extractErrorMessage(payload, statusCode) {
        const validation =
          (Array.isArray(payload?.error?.details) && payload.error.details[0]) ||
          (Array.isArray(payload?.detail) && payload.detail[0]) ||
          null;
        const validationMessage =
          validation?.msg ||
          validation?.message ||
          '';

        return (
          validationMessage ||
          payload?.error?.message ||
          payload?.message ||
          payload?.detail ||
          `Falha na API Liz (HTTP ${statusCode})`
        );
      }

      const runtime = window.__LIZ_RUNTIME || {};
      const proxyEnabled = Boolean(runtime.lizDirectProxy);

      if (!proxyEnabled) {
        setStatus('Proxy local da Liz indisponivel. Verifique backend/.env.', true);
      } else {
        setStatus('Servidor ativo e escutando.');
      }

      window.addEventListener('message', async event => {
        if (event.origin !== window.location.origin) return;

        const data = event.data;
        if (!data || typeof data !== 'object') return;
        if (data.channel !== CHANNEL || data.type !== REQUEST_TYPE) return;

        const requestId = String(data.requestId || '');
        if (!requestId) return;

        const sendResponse = response => {
          try {
            event.source?.postMessage({
              channel: CHANNEL,
              type: RESPONSE_TYPE,
              requestId,
              ...response,
            }, event.origin);
          } catch (error) {
            // no-op
          }
        };

        if (!proxyEnabled) {
          sendResponse({
            success: false,
            error: 'Proxy local da Liz nao configurado no server node.',
          });
          return;
        }

        const payload = data.payload && typeof data.payload === 'object' ? data.payload : {};
        const model = normalizeModel(payload.model);
        const modelConfig = MODEL_CONFIG[model] || MODEL_CONFIG.mini;
        const endpoint = `${String(window.location.origin || '').replace(/\/+$/, '')}${modelConfig.proxyPath}`;
        const messages = normalizeMessages(payload);
        if (messages.length === 0) {
          sendResponse({
            success: false,
            error: 'Mensagem invalida para envio a Liz.',
          });
          return;
        }
        const requestBody = {
          model: modelConfig.apiModel,
          messages,
          stream: Boolean(payload.stream),
        };

        setStatus('Processando chamada...');
        try {
          const response = await fetch(endpoint, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify(requestBody),
          });

          let jsonPayload = null;
          try {
            jsonPayload = await response.json();
          } catch (error) {
            jsonPayload = null;
          }

          if (!response.ok) {
            throw new Error(extractErrorMessage(jsonPayload, response.status));
          }

          sendResponse({
            success: true,
            data: jsonPayload,
          });
          setStatus('Servidor pronto.');
        } catch (error) {
          sendResponse({
            success: false,
            error: String(error?.message || 'Falha ao consultar API Liz.'),
          });
          setStatus('Falha temporaria na chamada.', true);
          window.setTimeout(() => {
            setStatus('Servidor pronto.');
          }, 1200);
        }
      });
    })();
  </script>
</body>
</html>
